  - name: objdump
    category: reverse
    description: "Display information from object files"
    risk_level: low
    allowed: true
    default_args_template: "-d {target}"

  - name: strace
    category: reverse
    description: "Trace system calls and signals"
    risk_level: low
    allowed: true
